[build]
  publish = "."
  command = "python generate_js.py"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200

[[headers]]
  for = "/data.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[context.production]
  environment = { NODE_VERSION = "18" }
